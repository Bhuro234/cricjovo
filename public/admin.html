<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Stream Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #020914; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .admin-card { background: rgba(6, 17, 33, 0.85); padding: 40px; border-radius: 20px; border: 1px solid rgba(0, 229, 255, 0.2); width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Bebas Neue', sans-serif; color: #00e5ff; font-size: 3rem; margin-top: 0; margin-bottom: 20px; text-align: center; letter-spacing: 2px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #8892b0; font-weight: 600; font-size: 1.1rem; }
        input, textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; font-family: inherit; font-size: 1rem; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 150px; font-family: monospace; }
        input:focus, textarea:focus { outline: none; border-color: #00e5ff; box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }
        button { background: #ff6b00; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; width: 100%; text-transform: uppercase; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
        button:hover { background: #ff8533; box-shadow: 0 5px 15px rgba(255, 107, 0, 0.4); transform: translateY(-2px); }
        #status { margin-top: 15px; text-align: center; font-weight: 600; padding: 10px; border-radius: 5px; display: none; }
        .success { background: rgba(0, 255, 0, 0.1); color: #00ff00; border: 1px solid #00ff00; }
        .error { background: rgba(255, 0, 0, 0.1); color: #ff3333; border: 1px solid #ff3333; }
        
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; color: #8892b0; font-weight: bold; transition: 0.3s; }
        .tab:hover { color: white; }
        .tab.active { color: #00e5ff; border-bottom: 2px solid #00e5ff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .suggestion-item { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .suggestion-date { font-size: 0.8rem; color: #8892b0; margin-bottom: 5px; }
        .suggestion-text { font-size: 1.1rem; line-height: 1.4; white-space: pre-wrap; }
        #load-suggestions-btn { margin-bottom: 20px; background: #00e5ff; color: #020914; }
        #load-suggestions-btn:hover { background: #33ebff; box-shadow: 0 5px 15px rgba(0, 229, 255, 0.4); }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1>Admin Control Panel</h1>
        
        <div class="form-group">
            <label for="password">Admin Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('stream')">Stream Update</div>
            <div class="tab" onclick="switchTab('suggestions')">Suggestions</div>
        </div>
        
        <div id="tab-stream" class="tab-content active">
            <div class="form-group">
                <label for="iframe-code">Live Stream Iframe Code</label>
                <textarea id="iframe-code" placeholder='<iframe src="..."></iframe>'></textarea>
            </div>
            <button onclick="updateStream()">Update Stream Now</button>
        </div>
        
        <div id="tab-suggestions" class="tab-content">
            <button id="load-suggestions-btn" onclick="loadSuggestions()">Load Suggestions</button>
            <div id="suggestions-list">
                <div style="color: #8892b0; text-align: center; padding: 20px;">Enter password and click Load Suggestions</div>
            </div>
        </div>
        
        <div id="status"></div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
